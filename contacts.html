<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Vinuthna</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #0f0f0f, #141220, #0f0f0f);
            color: white;
        }


        header {
            height: 100px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #a192cf;
            border-radius: 20px;
            margin-bottom: 80px;
        }

        #nav {
            width: 700px;
            display: flex;
            justify-content: space-around;
        }

        #nav a {
            text-decoration: none;
            color: white;
            font-size: 23px;
        }

        #nav a.active {
            color: black;
        }

        #nav a:hover {
            color: black;
        }

        .menuicon {
            display: none;
            font-size: 22px;
            color: white;
            cursor: pointer;
        }

        .contact-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: auto;
            padding: 80px 100px;
            gap: 80px;
        }

        .contact-left h1 {

            font-size: 60px;
            max-width: 500px;
            color: #A78BFA;
            text-shadow: 0 0 20px rgba(167, 139, 250, 0.5);
            margin-bottom: 20px;
        }

        .contact-left p {
            color: #ccc;
            font-size: 18px;
        }

        .contact-right {
            background: #1b1826;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.4);
            width: 400px;
        }

        input,
        textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #A78BFA;
            padding: 12px;
            margin-bottom: 25px;
            color: white;
            outline: none;
        }

        button {
            background: #A78BFA;
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: white;
            transform: scale(1.05);
        }

        /* ================= MOBILE ================= */

        @media(max-width:768px) {

            /* Navbar */

            header {
                height: 70px;
                padding: 0 15px;
                margin-bottom: 30px;
                border-radius: 12px;

                display: flex;
                justify-content: space-between;
                align-items: center;

                position: sticky;
                top: 0;
                z-index: 1000;
            }

            header img {
                height: 40px;
            }

            #nav {
                width: auto;
                display: flex;
                align-items: center;
            }

            .menuicon {
                display: block;
            }

            #nav a {
                display: none;
            }

            #nav.active {
                position: absolute;
                top: 75px;
                right: 10px;

                width: 170px;

                background: #a192cf;
                border-radius: 12px;

                padding: 8px 0;

                display: flex;
                flex-direction: column;

                z-index: 999;
            }

            #nav.active a {
                display: block;
                text-align: center;
                padding: 10px;
                font-size: 15px;
            }

            /* Contact Section */

            .contact-section {
                flex-direction: column;
                padding: 30px 20px;
                gap: 40px;
                text-align: center;
            }

            .contact-left h1 {
                font-size: 42px;
                line-height: 1.1;
            }

            .contact-left p {
                font-size: 16px;
                line-height: 24px;
            }

            .contact-right {
                width: 100%;
                max-width: 350px;
                padding: 25px;
            }

            input,
            textarea {
                font-size: 15px;
            }

            button {
                width: 100%;
            }
        }

        @media(max-width:480px) {

            .contact-left h1 {
                font-size: 34px;
            }

            .contact-left p {
                font-size: 15px;
            }

            .contact-right {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div><img src="./logo1.png" height="100px"></div>
        <div id="nav">
            <i class="fa-solid fa-bars menuicon"></i>
            <a href="./index.html">Home</a>
            <a href="./about.html">About</a>
            <a href="./projects.html">Projects</a>
            <a href="./experience.html">Experience</a>
            <a href="./Skills.html">Skills</a>
            <a class="active" href="./contacts.html">Contact</a>
        </div>
    </header>

    <section class="contact-section">
        <div class="contact-left">
            <h1>Let’s Build Something Great.</h1>
            <p>Have a project idea or just want to say hello?
                I’d love to hear from you.</p>
        </div>

        <div class="contact-right">
            <input type="text" placeholder="Your Name">
            <input type="email" placeholder="Email Address">
            <textarea rows="4" placeholder="Your Message"></textarea>
            <button>Send Message</button>
        </div>
    </section>
    <script>
        const menuIcon = document.querySelector(".menuicon");
        const nav = document.querySelector("#nav");

        menuIcon.addEventListener("click", () => {
            nav.classList.toggle("active");
        });
    </script>

</body>

</html>
